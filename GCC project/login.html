<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | HYoMM</title>

<link rel="stylesheet" href="css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2>Login to HYoMM</h2>

<p class="auth-sub">Access your portfolio dashboard</p>

<form>

<label>Email</label> <input type="email" placeholder="Enter your email">

<label>Password</label> <input type="password" placeholder="Enter your password">

<a href="dashboard.html" class="auth-btn">Login</a>


</form>

<p class="auth-switch">
Don't have an account? <a href="signup.html" >Create Account</a>
</p>

</div>

</div>
<script>

// apply saved theme when page loads
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
}

// toggle theme
const toggle = document.getElementById("themeToggle");

if(toggle){
toggle.addEventListener("click", () => {

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){
    localStorage.setItem("theme","dark");
}else{
    localStorage.setItem("theme","light");
}

});
}

</script>


</body>
</html>
